<!DOCTYPE html>
<html lang="en">
<head>
    <!-- include:head.html -->
    <meta name="description" content="Government and local notices relevant to monitored office locations. Track non-weather alerts and operational announcements from public agencies.">
    <title>Storm Scout - Government/Local Notices</title>
</head>
<body>
    <!-- include:nav.html -->

    <div id="main-content" class="container-fluid mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <h1>Government/Local Notices</h1>
                <p class="text-muted">Emergency declarations and official notices affecting operations</p>
            </div>
        </div>

        <!-- Update Banner -->
        <div class="row mb-3">
            <div class="col-12">
                <div id="update-banner-container"></div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-3">
                <select class="form-select" id="jurisdictionFilter">
                    <option value="">All Jurisdictions</option>
                    <option value="Federal">Federal</option>
                    <option value="State">State</option>
                    <option value="County">County</option>
                    <option value="City">City</option>
                </select>
            </div>
        </div>

        <div class="row" id="noticesContainer">
            <div class="col-12 text-center py-4">
                <span class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </span>
                <p class="mt-2 text-muted">Loading notices...</p>
            </div>
        </div>
    </div>

    <!-- include:footer.html -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/api.js?v=2.3.0"></script>
    <script src="js/version.js?v=2.3.0"></script>
    <script src="js/utils.js?v=2.3.0"></script>
    <script src="js/update-banner.js?v=2.3.0"></script>
    <script src="js/page-notices.js?v=2.3.0"></script>
</body>
</html>
