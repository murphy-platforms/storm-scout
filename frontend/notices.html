    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Scout - Government/Local Notices</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-cloud-lightning"></i> Storm Scout
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Overview</a></li>
                    <li class="nav-item"><a class="nav-link" href="advisories.html">Active Advisories</a></li>
                    <li class="nav-item"><a class="nav-link" href="sites.html">Sites Impacted</a></li>
                    <li class="nav-item"><a class="nav-link" href="map.html">Map View</a></li>
                    <li class="nav-item"><a class="nav-link active" href="notices.html">Government/Local Notices</a></li>
                    <li class="nav-item"><a class="nav-link" href="filters.html">Filter Settings</a></li>
                    <li class="nav-item"><a class="nav-link" href="sources.html">Sources</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="h2">Government/Local Notices</h1>
                <p class="text-muted">Emergency declarations and official notices affecting operations</p>
            </div>
        </div>

        <!-- Update Banner -->
        <div class="row mb-3">
            <div class="col-12">
                <div id="update-banner-container"></div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-3">
                <select class="form-select" id="jurisdictionFilter">
                    <option value="">All Jurisdictions</option>
                    <option value="Federal">Federal</option>
                    <option value="State">State</option>
                    <option value="County">County</option>
                    <option value="City">City</option>
                </select>
            </div>
        </div>

        <div class="row" id="noticesContainer">
            <div class="col-12 text-center">
                <span class="spinner-border"></span> Loading...
            </div>
        </div>
    </div>

    <footer class="bg-light text-center py-3 mt-5">
        <div class="container">
            <p class="text-muted mb-0">Storm Scout &copy; 2026 | IMT Operations Tool</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/update-banner.js"></script>
    <script>
        let allNotices = [];
        
        async function loadNotices() {
            try {
                const data = await API.getActiveNotices();
                allNotices = data;
                renderNotices(data);
            } catch (error) {
                document.getElementById('noticesContainer').innerHTML = 
                    '<div class="col-12 text-center text-danger">Failed to load notices</div>';
            }
        }
        
        function renderNotices(notices) {
            const container = document.getElementById('noticesContainer');
            if (notices.length === 0) {
                container.innerHTML = '<div class="col-12 text-center text-muted">No active government or local notices</div>';
                return;
            }
            
            container.innerHTML = notices.map(notice => `
                <div class="col-12 mb-3">
                    <div class="card">
                        <div class="card-header bg-warning-subtle">
                            <h5 class="mb-0">
                                <i class="bi bi-megaphone"></i> ${notice.title}
                                <span class="badge bg-secondary float-end">${notice.jurisdiction_type}</span>
                            </h5>
                        </div>
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2 text-muted">
                                ${notice.jurisdiction} | ${notice.notice_type}
                            </h6>
                            <p class="card-text">${notice.description || 'No description available'}</p>
                            <div class="row">
                                <div class="col-md-6">
                                    <small class="text-muted">
                                        <i class="bi bi-calendar"></i> Effective: ${formatDate(notice.effective_time)}
                                    </small>
                                </div>
                                <div class="col-md-6">
                                    <small class="text-muted">
                                        <i class="bi bi-geo"></i> Affected States: ${notice.affected_states || 'N/A'}
                                    </small>
                                </div>
                            </div>
                            ${notice.source_url ? `<a href="${notice.source_url}" target="_blank" class="btn btn-sm btn-outline-primary mt-2">View Source <i class="bi bi-box-arrow-up-right"></i></a>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function filterNotices() {
            const jurisdiction = document.getElementById('jurisdictionFilter').value;
            
            const filtered = allNotices.filter(notice => {
                if (jurisdiction && notice.jurisdiction_type !== jurisdiction) return false;
                return true;
            });
            
            renderNotices(filtered);
        }
        
        document.getElementById('jurisdictionFilter').addEventListener('change', filterNotices);
        
        loadNotices();
    </script>
    <script src="js/ui-toggle.js"></script>
</body>
</html>
