<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Storm Scout</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Settings-specific styles */
        .preset-section {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .preset-section h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 0.5rem;
        }

        .preset-section p {
            font-size: 0.875rem;
            color: var(--color-text-muted);
            margin-bottom: 1rem;
        }

        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .preset-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1rem;
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            color: var(--color-text-secondary);
            font-size: 0.8125rem;
            cursor: pointer;
            transition: var(--transition-base);
        }

        .preset-btn:hover {
            background: var(--color-bg-secondary);
            color: var(--color-text-primary);
            border-color: var(--color-border-hover);
        }

        .preset-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .preset-btn.save {
            background: var(--color-low);
            border-color: var(--color-low);
            color: #000;
        }

        .preset-btn.save:hover {
            opacity: 0.9;
        }

        /* Status bar */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            margin-bottom: 1.5rem;
        }

        .status-bar svg {
            color: var(--color-primary);
        }

        .status-text {
            flex: 1;
            font-size: 0.875rem;
        }

        .status-text strong {
            color: var(--color-text-primary);
        }

        .status-text span {
            color: var(--color-text-muted);
        }

        .status-counts {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .status-count {
            padding: 0.25rem 0.75rem;
            background: var(--color-bg-tertiary);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            color: var(--color-text-secondary);
        }

        /* Alert type sections */
        .alert-section {
            margin-bottom: 2rem;
        }

        .alert-section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--color-border);
        }

        .alert-section-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-text-primary);
            flex: 1;
        }

        .impact-badge {
            padding: 0.25rem 0.625rem;
            border-radius: var(--radius-sm);
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .impact-badge.critical { background: rgba(239, 68, 68, 0.15); color: var(--color-critical); }
        .impact-badge.high { background: rgba(249, 115, 22, 0.15); color: var(--color-high); }
        .impact-badge.moderate { background: rgba(234, 179, 8, 0.15); color: var(--color-moderate); }
        .impact-badge.low { background: rgba(34, 197, 94, 0.15); color: var(--color-low); }
        .impact-badge.info { background: var(--color-bg-tertiary); color: var(--color-text-muted); }

        .section-actions {
            display: flex;
            gap: 0.5rem;
        }

        .section-btn {
            padding: 0.375rem 0.75rem;
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            color: var(--color-text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition-base);
        }

        .section-btn:hover {
            background: var(--color-bg-card);
            color: var(--color-text-primary);
        }

        /* Alert type cards */
        .alert-types-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .alert-type-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 1rem;
            transition: var(--transition-base);
            cursor: pointer;
        }

        .alert-type-card:hover {
            border-color: var(--color-border-hover);
        }

        .alert-type-card.enabled {
            border-left: 3px solid var(--color-low);
        }

        .alert-type-card.disabled {
            opacity: 0.6;
        }

        .alert-type-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .toggle-switch {
            position: relative;
            width: 42px;
            height: 24px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: 24px;
            transition: var(--transition-base);
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: var(--color-text-muted);
            border-radius: 50%;
            transition: var(--transition-base);
        }

        input:checked + .toggle-slider {
            background-color: var(--color-low);
            border-color: var(--color-low);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(18px);
            background-color: white;
        }

        .alert-type-name {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-text-primary);
        }

        .alert-type-desc {
            font-size: 0.8125rem;
            color: var(--color-text-muted);
            line-height: 1.4;
        }

        /* Loading state */
        .loading-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        @media (max-width: 768px) {
            .preset-buttons {
                flex-direction: column;
            }

            .preset-btn {
                width: 100%;
                justify-content: center;
            }

            .status-bar {
                flex-direction: column;
                text-align: center;
            }

            .alert-types-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

        <nav class="sidebar-nav">

            <a href="advisories.html" class="nav-item">

                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>

                Advisories
            </a>
            <a href="sites.html" class="nav-item">

                </svg>

        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <h1>Alert Filter Settings</h1>
            </div>
        </header>

        <!-- Dashboard Content -->
        <div class="dashboard-content">
            <!-- Presets Section -->
            <div class="preset-section">
                <h2>Quick Presets</h2>
                <p>Apply a preset filter configuration or customize individual alert types below</p>
                <div class="preset-buttons">
                    <button class="preset-btn" onclick="applyPreset('CUSTOM')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>

                        </svg>
                        Site Default

                    <button class="preset-btn" onclick="applyPreset('OPERATIONS')">

                        </svg>
                        Operations View
                    </button>
                    <button class="preset-btn" onclick="applyPreset('EXECUTIVE')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                        Executive Summary
                    </button>
                    <button class="preset-btn" onclick="applyPreset('SAFETY')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                        Safety Focus
                    </button>
                    <button class="preset-btn" onclick="applyPreset('FULL')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="8" y1="6" x2="21" y2="6"/>
                            <line x1="8" y1="12" x2="21" y2="12"/>
                            <line x1="8" y1="18" x2="21" y2="18"/>
                            <line x1="3" y1="6" x2="3.01" y2="6"/>
                            <line x1="3" y1="12" x2="3.01" y2="12"/>
                            <line x1="3" y1="18" x2="3.01" y2="18"/>
                        </svg>
                        Full View
                    </button>
                    <button class="preset-btn" onclick="resetToDefaults()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
                        </svg>
                        Reset Defaults
                    </button>
                    <button class="preset-btn save" onclick="savePreferences()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Save Preferences

                </div>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="16" x2="12" y2="12"/>
                    <line x1="12" y1="8" x2="12.01" y2="8"/>
                </svg>
                <div class="status-text">
                    <strong>Active Filter:</strong> <span id="active-filter-status">Loading...</span>
                </div>
                <div class="status-counts">
                    <span class="status-count"><span id="enabled-count">0</span> enabled</span>
                    <span class="status-count"><span id="total-count">0</span> total</span>
                </div>
            </div>

            <!-- Alert Types Container -->
            <div id="alert-types-container">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading alert types...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        const STORAGE_KEY = 'stormScout_alertFilters';
        const DEFAULT_PRESET = 'CUSTOM';

        let alertTypesByLevel = {};
        let filterPresets = {};
        let currentFilters = {};

        const ALERT_DESCRIPTIONS = {
            'Tornado Warning': 'A tornado has been sighted or indicated by radar. Take shelter immediately.',
            'Hurricane Warning': 'Hurricane conditions expected within 36 hours. Complete preparations now.',
            'Flash Flood Warning': 'Flash flooding is occurring or imminent. Move to higher ground immediately.',
            'Severe Thunderstorm Warning': 'Severe thunderstorm producing damaging winds and/or large hail.',
            'Blizzard Warning': 'Severe winter storm with sustained winds 35+ mph and falling/blowing snow.',
            'Tsunami Warning': 'Tsunami is imminent or occurring. Evacuate coastal areas immediately.',
            'Winter Storm Warning': 'Significant winter weather expected. Prepare for hazardous conditions.',
            'Flood Warning': 'Flooding is occurring or imminent. Be prepared to evacuate.',
            'High Wind Warning': 'Sustained winds 40+ mph or gusts 58+ mph expected.',
            'Tornado Watch': 'Conditions favorable for tornado development. Monitor weather closely.',
            'Tropical Storm Warning': 'Tropical storm conditions expected within 36 hours.',
            'Winter Weather Advisory': 'Winter weather conditions may cause travel difficulties.',
            'Wind Advisory': 'Sustained winds 30-40 mph or gusts 45-57 mph expected.',
            'Heat Advisory': 'Heat index values may cause heat-related illness.',
            'Dense Fog Advisory': 'Dense fog reducing visibility to 1/4 mile or less.',
            'Small Craft Advisory': 'Hazardous conditions for small boats.',
            'Rip Current Statement': 'Dangerous rip currents present at beaches.',
            'Beach Hazards Statement': 'Hazardous conditions at beaches.',
            'Cold Weather Advisory': 'Cold temperatures may cause health concerns.',
            'Special Weather Statement': 'Non-warning informational statement about weather.',
            'Marine Weather Statement': 'Informational statement for marine interests.',
            'Hazardous Weather Outlook': 'Potential for hazardous weather in the coming days.'
        };

        const IMPACT_COLORS = {
            'CRITICAL': 'critical',
            'HIGH': 'high',
            'MODERATE': 'moderate',
            'LOW': 'low',
            'INFO': 'info'
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });
        });

        async function loadData() {
            try {
                const typesResponse = await fetch(`${API_BASE_URL}/filters/types/all`);
                const typesData = await typesResponse.json();
                alertTypesByLevel = typesData.data;

                const presetsResponse = await fetch(`${API_BASE_URL}/filters`);
                const presetsData = await presetsResponse.json();
                filterPresets = presetsData.data;

                loadPreferences();
                renderAlertTypes();
                updateStatus();

            } catch (error) {
                console.error('Failed to load data:', error);
                document.getElementById('alert-types-container').innerHTML =
                    '<div class="empty-state"><h3>Error Loading Data</h3><p>Failed to load alert types. Please refresh the page.</p></div>';
            }
        }

        function loadPreferences() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                currentFilters = JSON.parse(saved);
            } else {
                applyPreset(DEFAULT_PRESET, false);
            }
        }

        function savePreferences() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(currentFilters));
            
            const statusEl = document.getElementById('active-filter-status');
            const originalText = statusEl.textContent;
            statusEl.textContent = '✓ Preferences saved!';
            
            setTimeout(() => {
                statusEl.textContent = originalText;
            }, 2000);
        }

        function applyPreset(presetName, save = true) {
            const preset = filterPresets[presetName];
            if (!preset) return;

            currentFilters = {};

            for (const [level, types] of Object.entries(alertTypesByLevel)) {
                if (preset.includeCategories.includes(level)) {
                    types.forEach(type => {
                        if (!preset.excludeTypes || !preset.excludeTypes.includes(type)) {
                            currentFilters[type] = true;
                        }
                    });
                }
            }

            renderAlertTypes();
            updateStatus();

            if (save) {
                savePreferences();
            }
        }

        function resetToDefaults() {
            if (confirm('Reset to default filter settings?')) {
                applyPreset(DEFAULT_PRESET, true);
            }
        }

        function toggleAlertType(alertType) {
            currentFilters[alertType] = !currentFilters[alertType];
            
            const card = document.querySelector(`[data-alert-type="${alertType}"]`);
            if (card) {
                card.classList.toggle('enabled', currentFilters[alertType]);
                card.classList.toggle('disabled', !currentFilters[alertType]);
                const checkbox = card.querySelector('input[type="checkbox"]');
                if (checkbox) checkbox.checked = currentFilters[alertType];
            }

            updateStatus();
        }

        function renderAlertTypes() {
            const container = document.getElementById('alert-types-container');
            let html = '';

            for (const [level, types] of Object.entries(alertTypesByLevel)) {
                const colorClass = IMPACT_COLORS[level];
                const levelName = level.charAt(0) + level.slice(1).toLowerCase();

                html += `
                    <div class="alert-section">
                        <div class="alert-section-header">
                            <span class="impact-badge ${colorClass}">${levelName}</span>
                            <h3>${level} Impact Alerts</h3>
                            <div class="section-actions">
                                <button class="section-btn" onclick="toggleLevel('${level}', true)">Enable All</button>
                                <button class="section-btn" onclick="toggleLevel('${level}', false)">Disable All</button>
                            </div>
                        </div>
                        <div class="alert-types-grid">
                `;

                types.forEach(type => {
                    const isEnabled = currentFilters[type] === true;
                    const description = ALERT_DESCRIPTIONS[type] || 'Official NOAA weather alert type.';

                    html += `
                        <div class="alert-type-card ${isEnabled ? 'enabled' : 'disabled'}" data-alert-type="${type}" onclick="toggleAlertType('${type}')">
                            <div class="alert-type-header">
                                <label class="toggle-switch" onclick="event.stopPropagation()">
                                    <input type="checkbox" ${isEnabled ? 'checked' : ''} onchange="toggleAlertType('${type}')">
                                    <span class="toggle-slider"></span>
                                </label>
                                <span class="alert-type-name">${type}</span>
                            </div>
                            <p class="alert-type-desc">${description}</p>
                        </div>
                    `;
                });

                html += '</div></div>';
            }

            container.innerHTML = html;
        }

        function toggleLevel(level, enable) {
            const types = alertTypesByLevel[level];
            if (!types) return;

            types.forEach(type => {
                currentFilters[type] = enable;
            });

            renderAlertTypes();
            updateStatus();
        }

        function updateStatus() {
            const totalTypes = Object.values(alertTypesByLevel).flat().length;
            const enabledTypes = Object.values(currentFilters).filter(v => v === true).length;

            document.getElementById('enabled-count').textContent = enabledTypes;
            document.getElementById('total-count').textContent = totalTypes;

            let matchingPreset = 'Custom';
            for (const [name, preset] of Object.entries(filterPresets)) {
                if (isPresetMatch(preset)) {
                    matchingPreset = preset.name;
                    break;
                }
            }

            document.getElementById('active-filter-status').textContent = matchingPreset;
        }

        function isPresetMatch(preset) {
            for (const [level, types] of Object.entries(alertTypesByLevel)) {
                for (const type of types) {
                    const shouldBeEnabled = preset.includeCategories.includes(level) &&
                        (!preset.excludeTypes || !preset.excludeTypes.includes(type));
                    const isEnabled = currentFilters[type] === true;

                    if (shouldBeEnabled !== isEnabled) {
                        return false;
                    }
                }
            }
            return true;
        }
    </script>
    <script src="js/ui-toggle.js"></script>
</body>
</html>
