<!DOCTYPE html>
<html lang="en">
<head>
    <!-- include:head.html -->
    <meta name="description" content="Detailed view of a single office location showing active weather advisories, current NWS observations, and the full NOAA alert narrative.">
    <title>Storm Scout - Office Detail</title>
</head>
<body>
    <!-- include:nav.html -->

    <div id="main-content" class="container-fluid mt-4">
        <div class="row" id="filterWarningContainer"></div>
        <!-- Breadcrumb Navigation -->
        <div class="row mb-3">
            <div class="col-12">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="index.html">Overview</a></li>
                        <li class="breadcrumb-item"><a href="offices.html">Offices Impacted</a></li>
                        <li class="breadcrumb-item active" aria-current="page" id="breadcrumbOffice">Office Detail</li>
                    </ol>
                </nav>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="row">
            <div class="col-12 text-center py-5">
                <span class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </span>
                <p class="mt-2 text-muted">Loading office details...</p>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="row d-none">
            <div class="col-12">
                <div class="alert alert-danger" role="alert">
                    <h4><i class="bi bi-exclamation-triangle-fill me-2"></i>Error Loading Office</h4>
                    <p id="errorMessage"></p>
                    <a href="offices.html" class="btn btn-primary">View All Offices</a>
                </div>
            </div>
        </div>

        <!-- Office Detail Content -->
        <div id="officeContent" class="d-none">
            <!-- Office Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="card office-card" id="officeHeaderCard">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h1 class="mb-1">
                                        <strong id="officeCode"></strong> - <span id="officeName"></span>
                                    </h1>
                                    <p class="text-muted mb-0">
                                        <i class="bi bi-geo-alt"></i> <span id="officeLocation"></span>
                                    </p>
                                </div>
                                <div style="text-align: right;">
                                    <span class="badge severity-badge-large" id="highestSeverityBadge"></span>
                                    <div id="officeTempDisplay" class="temp-display"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Highest Severity Alert -->
            <div class="row mb-4">
                <div class="col-12">
                    <h4><i class="bi bi-exclamation-triangle-fill"></i> Highest Severity Alert</h4>
                </div>
                <div class="col-12">
                    <div class="card border-danger" id="highestAlertCard">
                        <div class="card-body">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Impact Summary -->
            <div class="row mb-4">
                <div class="col-12">
                    <h4><i class="bi bi-bar-chart-fill"></i> Impact Summary</h4>
                </div>
                <div class="col-12" id="impactSummaryContainer">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Timeline -->
            <div class="row mb-4">
                <div class="col-12">
                    <h4><i class="bi bi-clock-history"></i> Alert Timeline</h4>
                </div>
                <div class="col-12">
                    <div class="card">
                        <div class="card-body" id="timelineContainer">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- All Advisories -->
            <div class="row mb-4">
                <div class="col-12">
                    <h4><i class="bi bi-list-ul"></i> All Active Advisories (<span id="totalAdvisoryCount">0</span>)</h4>
                </div>
                <div class="col-12" id="allAdvisoriesContainer">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Detail Modal -->
    <div class="modal fade" id="alertDetailModal" tabindex="-1" role="dialog" aria-modal="true" aria-labelledby="alertDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="alertDetailModalLabel">Alert Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="alertDetailModalBody">
                    <!-- Populated by JS -->
                </div>
                <div class="modal-footer">
                    <div id="alertDetailModalLinks"></div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- include:footer.html -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/api.js?v=2.3.0"></script>
    <script src="js/version.js?v=2.3.0"></script>
    <script src="js/utils.js?v=2.3.0"></script>
    <script src="js/alert-filters.js?v=2.3.0"></script>
    <script src="js/aggregation.js?v=2.3.0"></script>
    <script src="js/page-office-detail.js?v=2.3.0"></script>
</body>
</html>
