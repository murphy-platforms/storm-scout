    <div class="container-fluid mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="h2">Sites Impacted</h1>
                <p class="text-muted">Testing centers currently impacted by weather advisories</p>
            </div>
        </div>

        <!-- Update Banner -->
        <div class="row mb-3">
            <div class="col-12">
                <div id="update-banner-container"></div>
            </div>
        </div>

        <!-- Active Filter Banner -->
        <div class="row mb-3" id="activeFilterBanner" style="display: none;">
            <div class="col-12">
                <div class="alert alert-info d-flex justify-content-between align-items-center mb-0">
                    <span>
                        <i class="bi bi-funnel-fill"></i>
                        <strong>Filtered:</strong> Showing <span id="activeFilterLabel"></span> sites
                    </span>
                    <button class="btn btn-sm btn-outline-secondary" id="clearFilterBtn">
                        <i class="bi bi-x-lg"></i> Clear Filter
                    </button>
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-3">
                <input type="text" class="form-control" id="searchBox" placeholder="Search sites...">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="stateFilter">
                    <option value="">All States</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="weatherImpactFilter">
                    <option value="">All Weather Impacts</option>
                    <option value="red">🔴 RED - High Impact</option>
                    <option value="orange">🟠 ORANGE - Severe Impact</option>
                    <option value="yellow">🟡 YELLOW - Moderate Impact</option>
                    <option value="green">🟢 GREEN - Low/No Impact</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="statusFilter">
                    <option value="">All Statuses</option>
                    <option value="Closed">Closed</option>
                    <option value="At Risk">At Risk</option>
                </select>
            </div>
        </div>

        <div class="row" id="sitesContainer">
            <div class="col-12 text-center">
                <span class="spinner-border"></span> Loading...
            </div>
        </div>
    </div>

    <footer class="footer-scout text-center py-3 mt-5">
        <div class="container">
            <p class="text-muted mb-0">Storm Scout &copy; 2026 | IMT Operations Tool</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/alert-filters.js"></script>
    <script src="js/update-banner.js"></script>
    <script src="js/aggregation.js"></script>
    <script>
        let allSites = [];
        let allAdvisories = [];
        let observationsMap = {};
        
        // Helper: convert Celsius to Fahrenheit
        function cToF(tempC) {
            if (tempC == null) return null;
            return Math.round((parseFloat(tempC) * 9 / 5) + 32);
        }
        
        // Helper: relative time string
        function timeAgo(dateString) {
            if (!dateString) return '';
            const now = Date.now();
            const then = new Date(dateString).getTime();
            const diffMin = Math.round((now - then) / 60000);
            if (diffMin < 1) return 'just now';
            if (diffMin < 60) return `${diffMin} min ago`;
            const diffHrs = Math.round(diffMin / 60);
            if (diffHrs < 24) return `${diffHrs} hr ago`;
            return `${Math.round(diffHrs / 24)} day ago`;
        }
        
        // Helper: check if observation is stale (>90 min)
        function isStale(observedAt) {
            if (!observedAt) return true;
            return (Date.now() - new Date(observedAt).getTime()) > 90 * 60 * 1000;
        }
        
        // Helper: truncate string
        function truncate(str, max) {
            if (!str) return '';
            return str.length > max ? str.substring(0, max) + '…' : str;
        }
        
        async function loadSites() {
            try {
                // Load all sites, advisories, and observations
                const [sites, advisories, obsData] = await Promise.all([
                    API.getSites(),
                    API.getActiveAdvisories(),
                    API.getObservations().catch(() => [])
                ]);
                
                // Build observations lookup by site_code
                observationsMap = {};
                obsData.forEach(obs => { observationsMap[obs.site_code] = obs; });
                
                allSites = sites;
                allAdvisories = advisories;
                
                // Apply filters and recalculate advisory counts
                // This will filter to only show sites WITH advisories
                const filteredData = applyFiltersToSites(sites, advisories);
                renderSites(filteredData);
                
                // Populate state filter
                const states = [...new Set(filteredData.map(s => s.state))].sort();
                const stateSelect = document.getElementById('stateFilter');
                states.forEach(state => {
                    const option = document.createElement('option');
                    option.value = state;
                    option.textContent = state;
                    stateSelect.appendChild(option);
                });
            } catch (error) {
                document.getElementById('sitesContainer').innerHTML = 
                    '<div class="col-12 text-center text-danger">Failed to load impacted sites</div>';
            }
        }
        
        // Apply user's filter preferences and aggregate
        function applyFiltersToSites(sites, advisories) {
            // Filter advisories based on user preferences
            const filteredAdvisories = AlertFilters.filterAdvisories(advisories);
            
            // Aggregate advisories by site with deduplication
            const aggregatedSites = SiteAggregator.aggregateBySite(filteredAdvisories, { deduplicateZones: true });
            
            // Create map for quick lookup
            const siteMap = new Map();
            aggregatedSites.forEach(site => {
                siteMap.set(site.site_id, site);
            });
            
            // Map severity to weather impact level (matches dashboard)
            const severityToImpact = { 'Extreme': 'red', 'Severe': 'orange', 'Moderate': 'yellow', 'Minor': 'green' };
            
            // Enhance original sites with aggregation data
            // Note: Sites API uses 'id', advisories use 'site_id'
            return sites
                .map(site => {
                    const aggData = siteMap.get(site.id);
                    if (!aggData) return null;
                    
                    return {
                        ...site,
                        advisory_count: aggData.unique_advisory_count,
                        highest_severity: aggData.highest_severity,
                        highest_severity_advisory: aggData.highest_severity_advisory,
                        new_count: aggData.new_count,
                        total_zone_count: aggData.total_zone_count,
                        weather_impact_level: severityToImpact[aggData.highest_severity] || 'green'
                    };
                })
                .filter(site => site !== null); // Remove sites without advisories
        }
        
        function renderSites(sites) {
            const container = document.getElementById('sitesContainer');
            if (sites.length === 0) {
                container.innerHTML = '<div class="col-12 text-center text-muted">No sites currently impacted</div>';
                return;
            }
            
            // Sort by urgency (sites with highest severity first)
            const sortedSites = [...sites].sort((a, b) => {
                const rankA = SiteAggregator.getSeverityRank(a.highest_severity || 'Minor');
                const rankB = SiteAggregator.getSeverityRank(b.highest_severity || 'Minor');
                return rankB - rankA;
            });
            
            container.innerHTML = sortedSites.map(site => {
                const severityClass = site.highest_severity ? `site-card-${escapeHtml(site.highest_severity.toLowerCase())}` : '';
                const advisory = site.highest_severity_advisory;
                const headlineText = advisory ? truncate(advisory.headline || '', 120) : '';
                const obs = observationsMap[site.site_code];
                
                // Temperature display
                let tempHtml = '';
                if (obs && obs.temperature_c != null) {
                    const tempF = cToF(obs.temperature_c);
                    const tempC = Math.round(parseFloat(obs.temperature_c));
                    const stale = isStale(obs.observed_at);
                    if (stale) {
                        tempHtml = `<div style="margin-top: 0.35rem; font-size: 0.85rem;">
                            <span class="text-dark">🌡️ ${tempF}°F / ${tempC}°C</span>
                            <small class="text-danger ms-2"><strong>${escapeHtml(obs.station_id)} - OFFLINE</strong></small>
                        </div>`;
                    } else {
                        tempHtml = `<div style="margin-top: 0.35rem; font-size: 0.85rem;">
                            <span class="text-dark">🌡️ ${tempF}°F / ${tempC}°C</span>
                            <small class="text-muted ms-2">${timeAgo(obs.observed_at)}</small>
                        </div>`;
                    }
                }
                
                return html`
                <div class="col-md-6 col-lg-4 mb-3">
                    <a href="site-detail.html?site=${site.site_code}" class="text-decoration-none">
                        <div class="card site-card site-card-clickable ${raw(severityClass)}">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <div>
                                        <h5 class="card-title mb-0 text-dark">
                                            <strong>${site.site_code}</strong> - ${site.name}
                                        </h5>
                                        <small class="text-muted"><i class="bi bi-geo-alt"></i> ${site.city}, ${site.state}</small>
                                    </div>
                                    <div style="text-align: right;">
                                        ${raw(site.highest_severity ? 
                                            `<span class="badge severity-badge-large severity-${escapeHtml(site.highest_severity.toLowerCase())}">
                                                ${escapeHtml(site.highest_severity)}
                                            </span>` : '')}
                                        ${raw(tempHtml)}
                                    </div>
                                </div>
                                
                                ${raw(advisory ? `
                                <div class="mb-2">
                                    <strong style="color: #dc3545;">${escapeHtml(advisory.advisory_type)}</strong>
                                    ${advisory.vtec_action === 'NEW' ? '<span class="badge action-badge-new ms-1">🆕 NEW</span>' : ''}
                                    ${headlineText ? '<br><small class="text-muted" style="line-height: 1.3; display: inline-block; margin-top: 0.25rem;">' + escapeHtml(headlineText) + '</small>' : ''}
                                </div>
                                ` : '')}
                                
                                <p class="card-text text-dark">
                                    <i class="bi bi-exclamation-triangle"></i> <strong>${site.advisory_count}</strong> active ${raw(site.advisory_count === 1 ? 'alert' : 'alerts')}
                                    ${raw(site.total_zone_count !== site.advisory_count ? 
                                        `<span class="text-muted small">(${site.total_zone_count} zones)</span>` : '')}
                                    ${raw(site.new_count > 0 ? `<br><i class="bi bi-bell"></i> <strong>${site.new_count}</strong> new` : '')}
                                </p>
                            </div>
                        </div>
                    </a>
                </div>
                `;
            }).join('');
        }
        
        function filterSites() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const state = document.getElementById('stateFilter').value;
            const weatherImpact = document.getElementById('weatherImpactFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            // First apply alert type filters to get updated advisory counts
            const filteredData = applyFiltersToSites(allSites, allAdvisories);
            
            // Then apply UI filters
            const filtered = filteredData.filter(site => {
                if (search && !(site.site_code.toLowerCase().includes(search) || site.name.toLowerCase().includes(search))) return false;
                if (state && site.state !== state) return false;
                if (weatherImpact && site.weather_impact_level !== weatherImpact) return false;
                if (status && site.operational_status !== status) return false;
                return true;
            });
            
            renderSites(filtered);
        }
        
        // Clear weather impact filter
        function clearWeatherFilter() {
            document.getElementById('weatherImpactFilter').value = '';
            document.getElementById('activeFilterBanner').style.display = 'none';
            // Update URL without the parameter
            const url = new URL(window.location);
            url.searchParams.delete('weather_impact');
            window.history.replaceState({}, '', url);
            filterSites();
        }
        
        document.getElementById('searchBox').addEventListener('input', filterSites);
        document.getElementById('stateFilter').addEventListener('change', filterSites);
        document.getElementById('weatherImpactFilter').addEventListener('change', function() {
            // Hide banner when manually changing filter
            if (!this.value) {
                document.getElementById('activeFilterBanner').style.display = 'none';
            }
            filterSites();
        });
        document.getElementById('statusFilter').addEventListener('change', filterSites);
        document.getElementById('clearFilterBtn').addEventListener('click', clearWeatherFilter);
        
        // Check for URL parameters on page load
        function applyURLParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const siteParam = urlParams.get('site');
            const weatherImpactParam = urlParams.get('weather_impact');
            
            if (siteParam) {
                // Auto-populate search box with site code from URL
                document.getElementById('searchBox').value = siteParam;
            }
            
            if (weatherImpactParam) {
                // Set weather impact filter from URL
                document.getElementById('weatherImpactFilter').value = weatherImpactParam;
                
                // Show active filter banner
                const labels = { red: '🔴 RED (High Impact)', orange: '🟠 ORANGE (Severe Impact)', yellow: '🟡 YELLOW (Moderate Impact)', green: '🟢 GREEN (Low/No Impact)' };
                document.getElementById('activeFilterLabel').textContent = labels[weatherImpactParam] || weatherImpactParam.toUpperCase();
                document.getElementById('activeFilterBanner').style.display = 'block';
            }
            
            // Trigger filtering
            filterSites();
        }
        
        // Initialize filters then load sites
        AlertFilters.init().then(async () => {
            await loadSites();
            // Apply URL parameters after sites are loaded
            applyURLParameters();
        });
    </script>
</body>
