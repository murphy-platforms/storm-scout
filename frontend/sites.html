<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Scout - Sites Impacted</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-cloud-lightning"></i> Storm Scout
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Overview</a></li>
                    <li class="nav-item"><a class="nav-link" href="advisories.html">Active Advisories</a></li>
                    <li class="nav-item"><a class="nav-link active" href="sites.html">Sites Impacted</a></li>
                    <li class="nav-item"><a class="nav-link" href="notices.html">Government/Local Notices</a></li>
                    <li class="nav-item"><a class="nav-link" href="filters.html">Filter Settings</a></li>
                    <li class="nav-item"><a class="nav-link" href="sources.html">Sources</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="h2">Sites Impacted</h1>
                <p class="text-muted">Testing centers currently impacted by weather advisories</p>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-3">
                <input type="text" class="form-control" id="searchBox" placeholder="Search sites...">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="stateFilter">
                    <option value="">All States</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="statusFilter">
                    <option value="">All Statuses</option>
                    <option value="Closed">Closed</option>
                    <option value="At Risk">At Risk</option>
                </select>
            </div>
        </div>

        <div class="row" id="sitesContainer">
            <div class="col-12 text-center">
                <span class="spinner-border"></span> Loading...
            </div>
        </div>
    </div>

    <footer class="bg-light text-center py-3 mt-5">
        <div class="container">
            <p class="text-muted mb-0">Storm Scout &copy; 2026 | IMT Operations Tool</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let allSites = [];
        
        async function loadSites() {
            try {
                const data = await API.getImpactedSites();
                allSites = data;
                renderSites(data);
                
                // Populate state filter
                const states = [...new Set(data.map(s => s.state))].sort();
                const stateSelect = document.getElementById('stateFilter');
                states.forEach(state => {
                    const option = document.createElement('option');
                    option.value = state;
                    option.textContent = state;
                    stateSelect.appendChild(option);
                });
            } catch (error) {
                document.getElementById('sitesContainer').innerHTML = 
                    '<div class="col-12 text-center text-danger">Failed to load impacted sites</div>';
            }
        }
        
        function renderSites(sites) {
            const container = document.getElementById('sitesContainer');
            if (sites.length === 0) {
                container.innerHTML = '<div class="col-12 text-center text-muted">No sites currently impacted</div>';
                return;
            }
            
            container.innerHTML = sites.map(site => `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card ${site.operational_status === 'Closed' ? 'border-danger' : 'border-warning'}">
                        <div class="card-body">
                            <h5 class="card-title">
                                ${site.site_code} - ${site.name}
                                <span class="badge ${getStatusBadge(site.operational_status)} float-end">${site.operational_status}</span>
                            </h5>
                            <p class="card-text">
                                <i class="bi bi-geo-alt"></i> ${site.city}, ${site.state}<br>
                                <i class="bi bi-map"></i> ${site.region || 'N/A'}<br>
                                <i class="bi bi-exclamation-triangle"></i> <strong>${site.advisory_count}</strong> active ${site.advisory_count === 1 ? 'advisory' : 'advisories'}
                            </p>
                            <p class="text-muted small mb-0">
                                ${site.reason || 'No reason provided'}
                            </p>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function filterSites() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const state = document.getElementById('stateFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            const filtered = allSites.filter(site => {
                if (search && !(site.site_code.toLowerCase().includes(search) || site.name.toLowerCase().includes(search))) return false;
                if (state && site.state !== state) return false;
                if (status && site.operational_status !== status) return false;
                return true;
            });
            
            renderSites(filtered);
        }
        
        document.getElementById('searchBox').addEventListener('input', filterSites);
        document.getElementById('stateFilter').addEventListener('change', filterSites);
        document.getElementById('statusFilter').addEventListener('change', filterSites);
        
        loadSites();
    </script>
</body>
</html>
