<!doctype html>
<html lang="en">
    <head>
        <!-- include:head.html -->
        <meta
            name="description"
            content="Browse all active NOAA weather advisories affecting monitored offices. Filter by impact level, advisory type, region, and state."
        />
        <title>Storm Scout - Active Advisories</title>
    </head>
    <body>
        <!-- include:nav.html -->

        <div id="main-content" class="container-fluid mt-4">
            <div class="row mb-4">
                <div class="col-12">
                    <h1>Active Advisories by Office</h1>
                    <p class="text-muted">Current weather advisories affecting monitored locations</p>
                </div>
            </div>

            <!-- Update Banner -->
            <div class="row mb-3">
                <div class="col-12">
                    <div id="update-banner-container"></div>
                </div>
            </div>

            <!-- Filter Indicators -->
            <div class="row mb-2 d-none" id="filterIndicatorRow">
                <div class="col-12">
                    <a href="filters.html" id="alertFilterIndicator" class="badge badge-filter-active text-decoration-none" title="Click to manage alert filters">
                        <i class="bi bi-funnel-fill"></i> Filters Active: <span id="filterCount">--</span> of <span id="filterTotal">--</span> alert types
                    </a>
                    <a href="locations.html" id="locationFilterIndicator" class="badge badge-filter-active text-decoration-none ms-2 d-none" title="Click to manage location filters">
                        <i class="bi bi-geo-alt-fill"></i> Locations: <span id="locationFilterCount">--</span> of <span id="locationFilterTotal">--</span>
                    </a>
                </div>
            </div>

            <!-- Filter Warning Banner -->
            <div class="row" id="filterWarningContainer"></div>

            <!-- View and Filter Controls -->
            <div class="row mb-3">
                <div class="col-md-12">
                    <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between">
                        <!-- View Toggle -->
                        <div class="view-toggle">
                            <button class="view-toggle-btn active" id="cardViewBtn">
                                <i class="bi bi-grid-3x2"></i> Card View
                            </button>
                            <button class="view-toggle-btn" id="tableViewBtn">
                                <i class="bi bi-table"></i> Table View
                            </button>
                        </div>

                        <!-- Deduplication Toggle -->
                        <div class="dedup-toggle-container">
                            <input type="checkbox" class="form-check-input" id="dedupToggle" checked />
                            <label for="dedupToggle"> <i class="bi bi-layers"></i> Simplify Multi-Zone Alerts </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search -->
            <div class="row mb-2">
                <div class="col-12 col-md-6">
                    <label for="searchBox" class="visually-hidden">Search by office code or name</label>
                    <input
                        type="text"
                        class="form-control"
                        id="searchBox"
                        placeholder="Search by office code or name..."
                    />
                </div>
            </div>

            <!-- Filter Controls -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="viewFilter" class="visually-hidden">Filter view</label>
                    <select class="form-select" id="viewFilter" title="Filter advisories">
                        <option value="all" selected>All Alerts</option>
                        <option value="CUSTOM">Office Default</option>
                        <option value="OPERATIONS">Operations View</option>
                        <option value="EXECUTIVE">Executive Summary</option>
                        <option value="SAFETY">Safety Focus</option>
                        <option value="FULL">Full View</option>
                        <optgroup label="By Severity">
                            <option value="severity:Extreme">Extreme Only</option>
                            <option value="severity:Severe">Severe Only</option>
                            <option value="severity:Moderate">Moderate Only</option>
                            <option value="severity:Minor">Minor Only</option>
                        </optgroup>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="stateFilter" class="visually-hidden">Filter by state</label>
                    <select class="form-select" id="stateFilter">
                        <option value="">All States</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="sortOrder" class="visually-hidden">Sort order</label>
                    <select class="form-select" id="sortOrder">
                        <option value="severity" selected>Sort by Severity</option>
                        <option value="office">Sort by Office Code</option>
                        <option value="alerts">Sort by Alert Count</option>
                        <option value="state">Sort by State</option>
                    </select>
                </div>
            </div>

            <!-- Summary Stats -->
            <div class="row" id="summaryStatsContainer"></div>

            <!-- Card View -->
            <div class="row" id="cardViewContainer">
                <div class="col-12 text-center py-4">
                    <span class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </span>
                    <p class="mt-2 text-muted">Loading advisories...</p>
                </div>
            </div>

            <!-- Table View (hidden by default) -->
            <div class="row d-none" id="tableViewContainer">
                <div class="col-12">
                    <div class="card">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>Office Code</th>
                                            <th>Temp</th>
                                            <th>Office Name</th>
                                            <th>Headline</th>
                                            <th>City</th>
                                            <th>State</th>
                                            <th>Advisory Type</th>
                                            <th>Severity</th>
                                            <th>Action</th>
                                            <th>Source</th>
                                            <th>Last Updated</th>
                                        </tr>
                                    </thead>
                                    <tbody id="advisoriesTable">
                                        <tr>
                                            <td colspan="11" class="text-center">
                                                <span class="spinner-border" role="status"
                                                    ><span class="visually-hidden">Loading...</span></span
                                                >
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- include:footer.html -->

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script src="js/api.js?v=2.3.0"></script>
        <script src="js/version.js?v=2.3.0"></script>
        <script src="js/utils.js?v=2.3.0"></script>
        <script src="js/location-filters.js?v=2.3.0"></script>
        <script src="js/alert-filters.js?v=2.3.0"></script>
        <script src="js/update-banner.js?v=2.3.0"></script>
        <script src="js/aggregation.js?v=2.3.0"></script>
        <script src="js/page-advisories.js?v=2.3.0"></script>
    </body>
</html>
