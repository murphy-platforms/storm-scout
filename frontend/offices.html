<!DOCTYPE html>
<html lang="en">
<head>
    <!-- include:head.html -->
    <meta name="description" content="View all offices impacted by active NOAA weather advisories. Sort by alert count, filter by region, and assess operational status at a glance.">
    <title>Storm Scout - Offices Impacted</title>
</head>
<body>
    <!-- include:nav.html -->

    <div id="main-content" class="container-fluid mt-4">
        <div class="row" id="filterWarningContainer"></div>
        <div class="row mb-4">
            <div class="col-12">
                <h1>Offices Impacted</h1>
                <p class="text-muted">Office locations currently impacted by weather advisories</p>
            </div>
        </div>

        <!-- Update Banner -->
        <div class="row mb-3">
            <div class="col-12">
                <div id="update-banner-container"></div>
            </div>
        </div>

        <!-- Filter Indicators -->
        <div class="row mb-2 d-none" id="filterIndicatorRow">
            <div class="col-12">
                <a href="filters.html" id="alertFilterIndicator" class="badge badge-filter-active text-decoration-none" title="Click to manage alert filters">
                    <i class="bi bi-funnel-fill"></i> Filters Active: <span id="filterCount">--</span> of <span id="filterTotal">--</span> alert types
                </a>
                <a href="locations.html" id="locationFilterIndicator" class="badge badge-filter-active text-decoration-none ms-2 d-none" title="Click to manage location filters">
                    <i class="bi bi-geo-alt-fill"></i> Locations: <span id="locationFilterCount">--</span> of <span id="locationFilterTotal">--</span>
                </a>
            </div>
        </div>

        <!-- Active Filter Banner -->
        <div class="row mb-3 d-none" id="activeFilterBanner">
            <div class="col-12">
                <div class="alert alert-info d-flex justify-content-between align-items-center mb-0">
                    <span>
                        <i class="bi bi-funnel-fill"></i>
                        <strong>Filtered:</strong> Showing <span id="activeFilterLabel"></span> offices
                    </span>
                    <button class="btn btn-sm btn-outline-secondary" id="clearFilterBtn">
                        <i class="bi bi-x-lg"></i> Clear Filter
                    </button>
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-3">
                <input type="text" class="form-control" id="searchBox" placeholder="Search offices...">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="stateFilter">
                    <option value="">All States</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="weatherImpactFilter">
                    <option value="">All Severities</option>
                    <option value="red">Extreme</option>
                    <option value="orange">Severe</option>
                    <option value="yellow">Moderate</option>
                    <option value="green">Minor</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="statusFilter">
                    <option value="">All Statuses</option>
                    <option value="Closed">Closed</option>
                    <option value="At Risk">At Risk</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="sortOrder">
                    <option value="severity" selected>Sort by Severity</option>
                    <option value="office">Sort by Office Code</option>
                    <option value="alerts">Sort by Alert Count</option>
                    <option value="state">Sort by State</option>
                </select>
            </div>
        </div>

        <div class="row" id="officesContainer">
            <div class="col-12 text-center py-4">
                <span class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </span>
                <p class="mt-2 text-muted">Loading offices...</p>
            </div>
        </div>
    </div>

    <!-- include:footer.html -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/api.js?v=2.2.0"></script>
    <script src="js/version.js?v=2.2.0"></script>
    <script src="js/utils.js?v=2.2.0"></script>
    <script src="js/location-filters.js?v=2.2.0"></script>
    <script src="js/alert-filters.js?v=2.2.0"></script>
    <script src="js/update-banner.js?v=2.2.0"></script>
    <script src="js/aggregation.js?v=2.2.0"></script>
    <script src="js/page-offices.js?v=2.2.0"></script>
</body>
</html>
