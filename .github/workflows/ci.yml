name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Run tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: storm_scout_ci
          MYSQL_USER: storm_scout
          MYSQL_PASSWORD: localdev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: storm_scout
      DB_PASSWORD: localdev
      DB_NAME: storm_scout_ci
      STATIC_FILES_PATH: ../frontend
      INGESTION_ENABLED: "false"
      NOAA_API_USER_AGENT: storm-scout-ci@example.com
      API_KEY: ci-test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Wait for MariaDB
        run: |
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1; then
              echo "MariaDB is reachable"
              exit 0
            fi
            sleep 2
          done
          echo "MariaDB did not become reachable in time"
          exit 1
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Initialize and seed test database
        working-directory: backend
        run: |
          npm run init-db
          npm run seed-db
      - name: Install E2E dependencies
        working-directory: e2e
        run: npm install --no-package-lock
      - name: Install Playwright browser + system dependencies
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        working-directory: e2e
        run: npm test
