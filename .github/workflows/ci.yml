name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Run tests with coverage
        run: npx jest --coverage --coverageReporters=text --coverageReporters=json-summary --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: junit.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: backend/test-results/junit.xml
      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Jest Unit Tests
          path: backend/test-results/junit.xml
          reporter: jest-junit
      - name: Extract coverage percentage
        if: github.ref == 'refs/heads/main'
        id: coverage
        run: |
          COVERAGE=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(c.total.lines.pct)")
          echo "lines=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && steps.coverage.outcome == 'success'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: storm-scout-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.lines }}%
          valColorRange: ${{ steps.coverage.outputs.lines }}
          minColorRange: 40
          maxColorRange: 90
          isError: ${{ steps.coverage.outputs.lines < 50 }}

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: storm_scout_ci
          MYSQL_USER: storm_scout
          MYSQL_PASSWORD: localdev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: storm_scout
      DB_PASSWORD: localdev
      DB_NAME: storm_scout_ci
      STATIC_FILES_PATH: ../frontend
      INGESTION_ENABLED: "false"
      NOAA_API_USER_AGENT: storm-scout-ci@example.com
      API_KEY: ci-test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Wait for MariaDB
        run: |
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1; then
              echo "MariaDB is reachable"
              exit 0
            fi
            sleep 2
          done
          echo "MariaDB did not become reachable in time"
          exit 1
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Initialize and seed test database
        working-directory: backend
        run: |
          npm run init-db
          npm run seed-db
      - name: Install E2E dependencies
        working-directory: e2e
        run: npm install --no-package-lock
      - name: Install Playwright browser + system dependencies
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        id: playwright
        working-directory: e2e
        run: npx playwright test --config=playwright.config.js --reporter=list --reporter=junit
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/e2e-junit.xml
      - name: Upload E2E results
        if: always() && steps.playwright.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: e2e/test-results/e2e-junit.xml
      - name: Report E2E results
        if: always() && steps.playwright.outcome != 'skipped'
        uses: dorny/test-reporter@v1
        with:
          name: Playwright E2E Tests
          path: e2e/test-results/e2e-junit.xml
          reporter: jest-junit
          fail-on-error: 'false'
